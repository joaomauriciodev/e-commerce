<mat-card class="anuncio-card">
    <mat-card-header>
      <mat-card-title>{{ title }}</mat-card-title>
    </mat-card-header>
    <img mat-card-image [src]="imageUrl" alt="Imagem do Anúncio">
    <mat-card-content>
      <p>{{ description }}</p>
      <p class="price">Preço: {{ price }}</p>
    </mat-card-content>
  </mat-card>
